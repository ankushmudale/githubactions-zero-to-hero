# This will deploy the safe / secure / tested app to prod server
name: Deploy to Prod server

on: 
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
          DOCKERHUB_USER: ${{vars.DOCKERHUB_USER}}
          DOCKER_TAG: ${{github.event.workflow_run.head_sha}}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set HEAD SHA environment variable
              run: |
                echo "DOCKER_TAG=${{github.event.workflow_run.head_sha}}" >> $GITHUB_ENV

            - name: SSH to Prod Server & create app folder
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                  echo "Installing Required packages & folders"
                  sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
                  sudo usermod -aG docker $USER
                  mkdir -p devops

            - name: Copy the docker-compose file 
              uses: appleboy/scp-action@v1
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: docker-compose.yml
                target: ~/devops

            - name: SSH to prod server & run the app
              uses: appleboy/scp-action@v1
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                  echo "Running the App"
                  export DOCKERHUB_USER=${{vars.DOCKERHUB_USER}}
                  export DOCKER_TAG=${{github.event.workflow_run.head_sha}}
                  export DOCKER_TAG=${{ github.sha }}
                  echo ${{ github.sha }}
                  echo ${{ secrets.GITHUB_TOKEN }} | docker login --username ${{vars.DOCKERHUB_USER}}
                  cd ~/devops && docker compose down && docker compose up -d --build --force-recreate


