# This is the name of workflow that will displayed in the action tab
name: CICD

# Manual click (deliver) whenever users needs
on:
  workflow_dispatch: 
    inputs:
      environment:
        description: This is the enviornment where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "Code clone from github"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build docker container
        run: echo "Docker container build"      
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"      
  deploy:
    if: inputs.environment == 'dev'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
    - name: Deploy the app
      run: echo "docker compose deployed the app"
  
